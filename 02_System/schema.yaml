## 3. 关系类型（Edge Types）

### 3.1 知识连接关系（8 种）

| ID | 关系 | 方向 | 允许源类型 → 允许目标类型 | 属性 | 示例 |
|----|------|------|------------------------|------|------|
| R01 | **DEPENDS_ON** | Concept → Concept | Concept → Concept | strength: strong\|weak | CUDA Warp Divergence → SIMT Model |
| R02 | **INSPIRED_BY** | Architecture → Paper\|Concept | Architecture → Paper, Concept | aspect: "具体受启发的方面" | AOS-Universal → Transformer |
| R03 | **IMPLEMENTS** | CodePattern\|Architecture → Concept | CodePattern, Architecture → Concept | completeness: 0-100% | PTX-EMU → PTX 指令集仿真 |
| R04 | **VERIFIED_BY** | Concept → Experiment | Concept → Experiment | result: confirmed\|refuted\|partial | 合并访问 → 性能测试报告 |
| R05 | **OBSOLETES** | Concept → Concept | Concept → Concept | reason: "淘汰原因" | Hopper 缓存策略 → Ampere 策略 |
| R06 | **REFINES** | Concept → Concept | Concept → Concept | detail_level: higher | Attention → Multi-Query Attention |
| R07 | **CONTRADICTS** | Concept ↔ Concept | Concept ↔ Concept | context: "矛盾的具体方面" | 128-byte vs 64-byte 对齐 |
| R08 | **BELONGS_TO** | Concept → Domain\|Topic | Concept → Domain, Topic | - | CUDA 概念 → GPU Architecture |

### 3.2 学术引用关系（4 种）

| ID | 关系 | 方向 | 允许源类型 → 允许目标类型 | 属性 | 示例 |
|----|------|------|------------------------|------|------|
| R09 | **CITES** | Paper → Paper | Paper → Paper | context: "引用上下文" | Attention Is All You Need → Sequence-to-Sequence |
| R10 | **SURPASSES** | Paper → Paper | Paper → Paper | metric, value_delta, dataset | LLaMA-3 → Mistral-7B |
| R11 | **REFUTES** | Paper → Paper | Paper → Paper | reason, evidence | 论文 A → 论文 B 的核心假设 |
| R12 | **PROPOSES** | Paper → Method | Paper → Method | - | Attention Is All You Need → Transformer |

### 3.3 人与组织关系（3 种）

| ID | 关系 | 方向 | 允许源类型 → 允许目标类型 | 属性 | 示例 |
|----|------|------|------------------------|------|------|
| R13 | **CREATED_BY** | Architecture\|Concept → Person | Architecture, Concept → Person | - | AOS-Universal → Suhua |
| R14 | **AFFILIATED_WITH** | Person → Organization | Person → Organization | - | Karpathy → OpenAI |
| R15 | **USED_IN** | Concept\|Method → Project | Concept, Method → Project | - | Transformer → CortiX |


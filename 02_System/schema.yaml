## 6. 命名规范

### 6.1 文件命名

- 基于 `title` 字段生成 slug（小写英文 + 连字符）
- 中文标题转为拼音或英文翻译
- 禁止特殊字符（空格、标点、中文）

| title | 文件名 |
|-------|--------|
| `"CUDA Warp Divergence"` | `cuda-warp-divergence.md` |
| `"Attention Is All You Need"` | `attention-is-all-you-need.md` |
| `"PTX-EMU: Warp Divergence 性能测试"` | `ptx-emu-warp-divergence-performance-test.md` |

### 6.2 目录命名

- 一级目录：`01_GPU_Architecture`, `02_CPU_Architecture` ...（数字前缀 + 大写 + 下划线）
- 二级/三级目录：`generations/`, `microarchitecture/`, `programming-models/` ...（小写 + 连字符）

---

## 7. 隐式边 vs 显式边

### 7.1 定义

| 类型 | 来源 | 解析方式 | 优先级 |
|------|------|---------|--------|
| **隐式边** | 正文 `[[wikilink]]` | Agent 扫描提取 | 低 |
| **显式边** | frontmatter `relations` | Agent 解析 YAML | 高 |

### 7.2 优先级规则

```
如果 relations.depends_on 包含 [[B]]
  → 生成 A --(DEPENDS_ON)--> B
  → 不再生成 A --(linked_to)--> B

如果正文仅有 [[B]] 但 relations 未声明
  → 生成 A --(linked_to)--> B（无类型边）
```

### 7.3 双向链接

```
页面 A 的 relations.depends_on 包含 [[页面 B]]
  → 页面 B 无需修改
  → Agent 动态计算 backlinks: [[页面 A]] (DEPENDS_ON reverse)
  → Obsidian Backlinks 面板自动显示
```


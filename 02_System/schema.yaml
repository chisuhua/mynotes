# PKGM 知识图谱 Schema

**版本**: V1.0  
**日期**: 2026-04-14  
**状态**: ✅ Active

---

## 1. 实体类型（Node Types）

### 1.1 核心类型（Phase 1）

| ID | 类型 | 文件位置 | 核心属性 | 必填属性 |
|----|------|---------|---------|---------|
| N01 | **Concept** | `01_Wiki/concepts/` | name, domain, definition, aliases[], tags[] | name, definition |
| N02 | **Architecture** | `01_Wiki/entities/` | name, project, version, status, diagram | name, project |
| N03 | **Decision** | `01_Wiki/entities/` | id, context, decision, status, date | id, decision |
| N04 | **Experiment** | `01_Wiki/entities/` | name, hypothesis, result, date, evidence[] | name, result |
| N05 | **Paper** | `01_Wiki/entities/` | title, year, authors[], doi, venue, abstract | title, year |
| N06 | **Method** | `01_Wiki/concepts/` | name, category, description, source_paper | name, description |
| N07 | **Person** | `01_Wiki/entities/` | name, role, affiliation, notable_work[] | name |
| N08 | **Organization** | `01_Wiki/entities/` | name, type, url, notable_projects[] | name |

### 1.2 扩展类型（Phase 2+）

| ID | 类型 | 说明 | 核心属性 |
|----|------|------|---------|
| N09 | **CodePattern** | 代码模式/最佳实践 | name, language, code_ref, complexity |
| N10 | **Project** | 项目元数据 | name, repo, status, tech_stack[] |
| N11 | **Tool** | 工具/框架 | name, category, url, alternatives[] |
| N12 | **Question** | 待研究问题 | question, priority, status, related_concepts[] |


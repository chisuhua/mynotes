## 4. 关系属性格式

### 4.1 简单关系（无额外属性）

```yaml
relations:
  depends_on:
    - "[[SIMT Execution Model]]"
    - "[[CUDA Warp]]"
  belongs_to:
    - "[[01_GPU_Architecture]]"
```

### 4.2 复杂关系（有属性）

```yaml
relations:
  surpasses:
    - target: "[[Mistral-7B]]"
      metric: "MMLU Score"
      value_delta: "+5.2%"
      dataset: "MMLU-57"
  verified_by:
    - target: "[[PTX-EMU: Warp Divergence 性能测试]]"
      result: "confirmed"
      date: "2026-04-14"
  contradicts:
    - target: "[[CUDA 合并访问策略 v1]]"
      context: "Hopper 架构行为已改变"
```


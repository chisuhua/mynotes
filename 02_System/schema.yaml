## 8. 扩展机制

### 8.1 新增实体类型

```yaml
# 在本文件中添加
entity_types:
  MyNewType:
    description: "类型描述"
    attributes:
      - name: "attr1"
        type: string
        required: true
      - name: "attr2"
        type: number
        required: false
```

### 8.2 新增关系类型

```yaml
# 在本文件中添加
relation_types:
  MY_NEW_RELATION:
    description: "关系描述"
    from: ["Concept", "Architecture"]    # 允许的源类型
    to: ["Concept", "Method"]             # 允许的目标类型
    directed: true                        # 是否有方向
    properties:                           # 关系属性（可选）
      - name: "weight"
        type: number
```

### 8.3 版本管理

- Schema 文件带版本号（本文件：V1.0）
- 新增类型不影响已有页面
- 废弃类型标记为 `deprecated`，不物理删除


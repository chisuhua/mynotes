## 5. 页面格式规范

### 5.1 Frontmatter 结构

```yaml
---
title: "页面标题"
type: concept | paper | person | organization | architecture | decision | experiment | method
domain: "01_GPU_Architecture"  # 对应 04_Knowledge 一级目录

# 溯源
source_type: primary
source_ref: "来源描述"
source_url: "https://..."
confidence: 4
tags: [tag1, tag2]
aliases: [别名 1, 别名 2]

# 验证
verification:
  status: unverified

# 生命周期
lifecycle:
  status: active

# 创建/更新
created: 2026-04-14
created_by: "agent/ingest"
updated: 2026-04-14
updated_by: "agent/ingest"

# 关系
relations:
  depends_on:
    - "[[相关概念]]"
  belongs_to:
    - "[[01_GPU_Architecture]]"

# 提取来源（01_Wiki 页面专用）
extracted_from: "[[04_Knowledge/...]]"  # 可选
---
```

### 5.2 正文结构

```markdown
# 页面标题

## 定义 / 摘要

...

## 我的理解 🧠

...（可选，原创思考）

## 来源 📖

> 来源：[[primary]] 来源描述

## 关联

- **依赖**: [[概念 1]], [[概念 2]]
- **验证**: [[实验页面]]
```


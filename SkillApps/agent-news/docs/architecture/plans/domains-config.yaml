# Agent News 领域配置

**版本**: v1.0  
**创建时间**: 2026-03-29  
**用途**: 配置支持的领域和数据源

---

## 领域列表

```yaml
domains:
  - id: agent-research          # 智能体研究（当前领域）
    name: "智能体研究领域"
    enabled: true
    sources:
      - arxiv                   # 学术论文
      - github                  # 代码仓库
      - blogs                   # 技术博客
      - social                  # 社交媒体
    keywords:
      - "AI Agent"
      - "智能体"
      - "Autonomous Agent"
      - "Agent Framework"
      - "Multi-Agent"
    
  - id: llm-internal            # 大模型内部结构（未来扩展）
    name: "大模型内部结构"
    enabled: false               # 暂未启用
    sources:
      - arxiv
      - blogs
    keywords:
      - "Transformer"
      - "MoE"
      - "Attention Mechanism"
      
  - id: agent-market            # 智能体市场化（未来扩展）
    name: "智能体市场化"
    enabled: false
    sources:
      - blogs
      - social
      - news
    keywords:
      - "Agent Market"
      - "AI Business"
      - "智能体商业化"
      
  - id: agent-industry          # 智能体对行业影响（未来扩展）
    name: "智能体对行业影响"
    enabled: false
    sources:
      - blogs
      - news
    keywords:
      - "AI Impact"
      - "Industry Automation"
      - "智能体应用"
```

---

## 数据源配置

```yaml
sources:
  arxiv:
    name: "arXiv 论文"
    type: "api"
    api_url: "https://export.arxiv.org/api/query"
    rate_limit: "100/小时"
    
  github:
    name: "GitHub Trending"
    type: "web"
    url: "https://github.com/trending"
    rate_limit: "60/小时"
    
  blogs:
    name: "技术博客"
    type: "rss"
    feeds:
      - "https://openai.com/blog/feed"
      - "https://www.anthropic.com/news/feed"
      - "https://clawhub.ai/feed"
    rate_limit: "30/小时"
    
  social:
    name: "社交媒体"
    type: "api"
    platforms:
      - twitter
      - reddit
    rate_limit: "50/小时"
    
  news:
    name: "科技新闻"
    type: "rss"
    feeds:
      - "https://techcrunch.com/feed/"
      - "https://www.theverge.com/rss/index.xml"
    rate_limit: "30/小时"
```

---

## 输出配置

```yaml
output:
  # 原始链接汇总
  raw_links:
    enabled: true
    format: "markdown"
    file: "daily/raw_links_{date}.md"
    
  # 自动摘要
  summary:
    enabled: true
    model: "default"
    max_length: 200
    
  # 结构化存储
  storage:
    enabled: true
    type: "sqlite"
    database: "agent_news.db"
    
  # 分析报告
  report:
    enabled: true
    format: "markdown"
    file: "daily/report_{date}.md"
    include_trends: true
```

---

## 去重配置

```yaml
deduplication:
  enabled: true
  method: "fingerprint"         # 指纹去重
  fields:
    - title                     # 标题去重
    - url                       # URL 去重
  retention_days: 30            # 保留 30 天记录
```

---

## 调度配置

```yaml
schedule:
  enabled: true
  cron: "0 9 * * *"            # 每日 9:00 执行
  timezone: "Asia/Shanghai"
```

